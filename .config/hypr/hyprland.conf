source = theme.conf

################
### MONITORS ###
################

monitor=DP-2,1920x1080@144.00,0x0,1
monitor=HDMI-A-1,1440x900@74.98,-1440x90,1

monitor=,preferred,auto,1                # Default configuration for any new monitor

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = alacritty
$fileManager = thunar
$menu = walker

$main_bar = waybar -c .config/waybar/main-bar/config.jsonc -s .config/waybar/main-bar/style.css
$mouseController = ratbagd
$walpaper_setter = awww-daemon

$hyprlandListenerScript = $HOME/.config/hypr/scripts/socket2scripts.sh
$theme_switcher = $HOME/.config/theme_switcher/theme_switcher.sh

#################
### AUTOSTART ###
#################

# Daemons and background stuff
exec-once = $hyprlandListenerScript
exec-once = xrandr --output DP-2 --primary
exec-once = $mouseController				        # Enable correct mouse DPI
exec-once = $fileManager --daemon    			  # Start file manager daemon, so it opens faster and manages removable devices
exec-once = walker --gapplication-service		# App launcher service

# Startup apps
exec-once = steam
exec-once = discord
exec-once = spotify-launcher
exec-once = sleep 1 && vivaldi

# Usefull applications
exec-once = $main_bar             # Top bars
exec-once = hyprpm reload -n			# Reload my hyprland plugins
exec-once = $walpaper_setter			# Set my wallpaper

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Dracula

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = GTK_IM_MODULE,fcitx5
env = QT_IM_MODULE,fcitx5
env = XMODIFIERS,"@im=fcitx5"

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

ecosystem {
  enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### PLUGINS       ###
#####################

plugin {
  hyprsplit {
    num_workspaces = 6
    persistent_workspaces = true
  }
  csgo-vulkan-fix {
    res_w = 1440
    res_h = 1080
    class = "SDL Application"
    fix_mouse = true
  }
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

xwayland {
  force_zero_scaling = true
}

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.inactive_border = rgba(595959aa)
    col.active_border = $accent $active_border 45deg
    col.inactive_border = $surface1

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    screen_shader = ~/.config/hypr/shaders/saturation.glsl

    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.99
    inactive_opacity = 0.7

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color           = $shadow
        color_inactive  = $shadow_inactive
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 2

        new_optimizations= true
        xray            = false
    }
}

animations {
    enabled = true

    # --- Bezier Curves ---
    # Snappy ease-out with a slight overshoot — satisfying for windows
    bezier = snappy,     0.05, 0.9, 0.1, 1.05

    # Clean ease-out, no overshoot — good for fades and borders
    bezier = smoothOut,  0.16, 1.0, 0.3, 1.0

    # Ease-in for closing animations
    bezier = smoothIn,   0.4, 0.0, 1.0, 0.6

    # Constant speed — used for looping (border angle, etc.)
    bezier = linear,     0.0, 0.0, 1.0, 1.0


    # --- Windows ---
    animation = windows,      1, 4, snappy,    slide
    animation = windowsOut,   1, 3, smoothIn,  slide
    animation = windowsMove,  1, 4, snappy


    # --- Borders ---
    animation = border,       1, 6, smoothOut
    #animation = borderangle,  1, 8, linear, loop   # remove if you don't use animated borders


    # --- Fades ---
    animation = fade,         1, 4, smoothOut
    animation = fadeDim,      1, 4, smoothOut


    # --- Workspaces ---
    animation = workspaces,   1, 4, snappy, slide
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true  # If true disables the random hyprland logo / anime girl background.
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = fkeys:basic_13-24,grp:alt_shift_toggle
    kb_rules =
    numlock_by_default = true

    follow_mouse = 1
    accel_profile = flat

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Pass binds
bind = , mouse:276, pass, class:^(discord)$
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, T, exec, $theme_switcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# hyprlang if HYPRSPLIT

# Switch workspaces with mainMod + [0-9] with hyprsplit
bind = $mainMod, 1, split:workspace, 1
bind = $mainMod, 2, split:workspace, 2
bind = $mainMod, 3, split:workspace, 3
bind = $mainMod, 4, split:workspace, 4
bind = $mainMod, 5, split:workspace, 5
bind = $mainMod, 6, split:workspace, 6

# Move active window to a workspace with mainMod + SHIFT + [0-9] with hyprsplit
bind = $mainMod SHIFT, 1, split:movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, split:movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, split:movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, split:movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, split:movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, split:movetoworkspacesilent, 6

# Fix for things
bind = SUPER, G, split:grabroguewindows

# hyprlang endif

# hyprlang if !HYPRSPLIT

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# hyprlang endif

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Keyboard knob
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-   

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot a region
bind = , XF86Calculator, exec, hyprshot -m region
# Screenshot an active window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot the active output (monitor)
bind = $mainMod_SHIFT, PRINT, exec, hyprshot -m output   

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Persistant workspaces for each monitor
# Monitor 1
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1

# Monitor 2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2
workspace = 11, monitor:DP-2
workspace = 12, monitor:DP-2

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Make vivaldi opaque
windowrule {
    name = browser-opacity

    match:class = ^(vivaldi-stable)$

    opacity = 1.0 override

}

# Make dialog windows float (two different ways)
windowrule {
    name = dialog-window-float
    match:modal = true

    float = yes
}
windowrule {
    name = dialog-window-float2
    match:title = ^(.*Settings.*|.*Preferences.*|.*Dialog.*)    
    float = yes
}

# Make some apps open on their specific workspace
# Make steam games open on the games workspace
windowrule {
  name = steam-on-games-workspace
  match:class = ^(steam_app_.*)$

  workspace = 9
}   
# Same as previous, but for gamescope
windowrule {
  name = gamescope-to-games-workspace
  match:class = ^gamescope$

  workspace = 9
}
# CS2
windowrule {
  name = cs2-to-games-workspace
  match:class = ^cs2$

  workspace = 9
  immediate = yes
}
# TF2
windowrule {
  name = tf2-to-games-workspace
  match:class = ^tf_linux64$

  workspace = 9
  immediate = yes
}
# Quaver
windowrule {
  name = quaver-to-games-workspace
  match:class = ^Quaver$

  workspace = 9
  immediate = yes
}


#windowrule {
#  name = Unreal-Editor-Sizes
#  match:class = UnrealEditor$
#
#  float = true
#} 

windowrule = workspace 1 silent, match:initial_class vivaldi-stable
windowrule = workspace 2 silent, match:class discord
windowrule = workspace 3 silent, match:class Spotify
windowrule = workspace 8 silent, match:class steam
